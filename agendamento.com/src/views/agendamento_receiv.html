  <style>
    body {
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      top:0; left:0; right:0; bottom:0;
      z-index: -1;
    }
    .sidebar {
      width: 260px;
      height: 100vh;
      color: white;
      position: fixed;
      top: 0;
      left: 0;
      transition: transform 0.3s ease-in-out;
      z-index: 1000;
      background-color: #f8f9fa;
    }
    @media (max-width: 992px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.show {
        transform: translateX(0);
      }
    }
    .content {
      margin-left: 260px;
      padding: 20px;
    }

    @media (max-width: 992px) {
      .content {
        margin-left: 0;
      }
    }
    .topbar, .mobile-navbar {
      padding: 10px 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-custom {
      border: none;
      color: white;
      border-radius: 12px;
    }
    canvas {
      max-height: 250px !important;
    }
  </style>
</head>
