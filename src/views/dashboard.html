<div class="mt-4 card card-custom p-4 shadow-lg">
  <h5 class="mb-3">Atividade Mensal (Admissões, Desligamentos e Ausências)</h5>
  <canvas id="graficoZigZag" height="320"></canvas>
</div>
<script>
  if (!window._charts) window._charts = [];
  window._charts.forEach(c => c.destroy());
  window._charts = [];
  (function(){
    const ctx = document.getElementById('grafico1').getContext('2d');
    const departamentos = ['TI','RH','Vendas','Financeiro','Operações','Marketing'];
    const valores = [28, 12, 34, 10, 40, 18];
    const cores = [
      '#4e73df','#1cc88a','#36b9cc','#f6c23e','#e74a3b','#858796'
    ];
    const data = {
      labels: departamentos,
      datasets: [{
        data: valores,
        backgroundColor: cores,
        borderColor: '#ffffff',
        borderWidth: 2,
        hoverOffset: 12
      }]
    };
    const config = {
      type: 'doughnut',
      data,
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '55%',
        plugins: {
          legend: {
            position: 'right',
            labels: { boxWidth:12, padding:12 }
          },
          tooltip: {
            callbacks: {
              label: ctx => {
                const v = ctx.raw;
                const total = ctx.dataset.data.reduce((a,b)=>a+b,0);
                const pct = ((v/total)*100).toFixed(1);
                return `${ctx.label}: ${v} (${pct}%)`;
              }
            }
          }
        }
      }
    };
    window._charts.push(new Chart(ctx, config));
  })();
  (function(){
    const ctx = document.getElementById('grafico2').getContext('2d');
    const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    const admissoes = [5,8,6,7,10,9,12,11,8,6,7,9];
    const desligamentos = [2,3,4,2,1,5,3,4,2,3,2,1];
    function grad(ctx, colorStart, colorEnd){
      const g = ctx.createLinearGradient(0,0,0,300);
      g.addColorStop(0, colorStart);
      g.addColorStop(1, colorEnd);
      return g;
    }
    const data = {
      labels: meses,
      datasets: [
        {
          label: 'Admissões',
          data: admissoes,
          backgroundColor: grad(ctx, 'rgba(78,115,223,0.95)', 'rgba(78,115,223,0.6)'),
          borderRadius: 6,
          borderSkipped: false
        },
        {
          label: 'Desligamentos',
          data: desligamentos,
          backgroundColor: grad(ctx, 'rgba(231,74,59,0.95)', 'rgba(231,74,59,0.6)'),
          borderRadius: 6,
          borderSkipped: false
        }
      ]
    };
    const config = {
      type: 'bar',
      data,
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'top' },
          tooltip: {
            mode: 'index',
            intersect: false,
            callbacks: {
              label: item => `${item.dataset.label}: ${item.parsed.y}`
            }
          }
        },
        interaction: { mode: 'index', intersect: false },
        scales: {
          x: {
            stacked: true,
            grid: { display: false }
          },
          y: {
            stacked: false,
            beginAtZero: true,
            ticks: { stepSize: 5 }
          }
        }
      }
    };
    window._charts.push(new Chart(ctx, config));
  })();
</script>
<script>
  (function(){
    const ctx = document.getElementById('graficoZigZag').getContext('2d');

    const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

    const admissoes = [5,8,6,7,10,9,12,11,8,6,7,9];
    const desligamentos = [2,3,4,2,1,5,3,4,2,3,2,1];
    const ausencias = [1,2,3,4,2,3,5,3,2,4,3,2];

    const grad1 = ctx.createLinearGradient(0,0,0,300);
    grad1.addColorStop(0, 'rgba(78,115,223,0.6)');
    grad1.addColorStop(1, 'rgba(78,115,223,0)');

    const grad2 = ctx.createLinearGradient(0,0,0,300);
    grad2.addColorStop(0, 'rgba(231,74,59,0.6)');
    grad2.addColorStop(1, 'rgba(231,74,59,0)');

    const grad3 = ctx.createLinearGradient(0,0,0,300);
    grad3.addColorStop(0, 'rgba(28,200,138,0.6)');
    grad3.addColorStop(1, 'rgba(28,200,138,0)');

    const data = {
      labels: meses,
      datasets: [
        {
          label: 'Agendamentos',
          data: admissoes,
          borderColor: '#4e73df',
          backgroundColor: grad1,
          fill: true,
          tension: 0.4,
          pointRadius: 4,
          pointHoverRadius: 6
        },
        {
          label: 'Pendentes',
          data: desligamentos,
          borderColor: '#e74a3b',
          backgroundColor: grad2,
          fill: true,
          tension: 0.4,
          pointRadius: 4,
          pointHoverRadius: 6
        },
        {
          label: 'Matriculados',
          data: ausencias,
          borderColor: '#1cc88a',
          backgroundColor: grad3,
          fill: true,
          tension: 0.4,
          pointRadius: 4,
          pointHoverRadius: 6
        }
      ]
    };
    const config = {
      type: 'line',
      data,
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { position: 'top' },
          tooltip: {
            callbacks: {
              label: item => `${item.dataset.label}: ${item.formattedValue}`
            }
          }
        },
        scales: {
          x: {
            grid: { display: false }
          },
          y: {
            beginAtZero: true,
            grid: { color: '#eee' },
            ticks: { stepSize: 2 }
          }
        }
      }
    };

    window._charts.push(new Chart(ctx, config));
  })();
</script>
<script>
    new Chart(document.getElementById('grafico1'), {
      type: 'doughnut',
      data: {
        labels: ['Masculino', 'Feminino'],

        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { color: '#fff' } },
          x: { ticks: { color: '#fff' } }
        }
      }
    });
    new Chart(document.getElementById('graficoZigZag'), {
      type: 'line',
      data: {
        labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul'],
        datasets: [{
          label: 'Atividade',
          data: [30, 70, 40, 90, 50, 100, 60],
          borderColor: '#0d6efd',
          fill: false,
          tension: 0.3,
          borderWidth: 2,
          pointBackgroundColor: '#fff',
          pointBorderColor: '#0d6efd',
          pointRadius: 5
        }]
      },
      options: {
        plugins: { legend: { labels: { color: '#fff' } } },
        scales: {
          y: { beginAtZero: true, ticks: { color: '#fff' } },
          x: { ticks: { color: '#fff' } }
        }
      }
    });
  </script>
<script>
const btnMenu = document.getElementById('btnMenu');
const sidebar = document.getElementById('sidebar');

btnMenu.addEventListener('click', () => {
  if (window.innerWidth < 992) {
    sidebar.classList.toggle('show');
  }
});
document.addEventListener('click', (e) => {
  if (window.innerWidth < 992) {
    if (!sidebar.contains(e.target) && !btnMenu.contains(e.target)) {
      sidebar.classList.remove('show');
    }
  }
});

window.addEventListener('resize', () => {
  if (window.innerWidth >= 992) {
    sidebar.classList.remove('show');
  }
});
</script>
